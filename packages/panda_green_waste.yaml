panda_green_waste:
  template:
    - sensor:
        - name: Panda Today Subjects
          unique_id: panda_today_subjects
          state: >
            {% set entries = state_attr('sensor.panda_green_waste_today_services', 'entries') or [] %}
            {{ entries | count }}
          attributes:
            summary: >
              {% set entries = state_attr('sensor.panda_green_waste_today_services', 'entries') or [] %}
              {% if entries %}
                {{ entries | map(attribute='subject') | list | join(', ') }}
              {% else %}
                No Panda calendar entries today
              {% endif %}
            entries: >
              {{ state_attr('sensor.panda_green_waste_today_services', 'entries') or [] }}
        - name: Panda Last Ordered Collection
          unique_id: panda_last_ordered_collection_summary
          state: >
            {{ states('input_text.panda_last_ordered_collection') }}
          attributes:
            access_window: >
              {{ states('input_text.panda_last_ordered_access_window') }}
            ordered_at: >
              {{ states('input_text.panda_last_ordered_at') }}
        - name: Panda Calendar Next 10 Days
          unique_id: panda_calendar_next_10_days
          state: >
            {% set entries = state_attr('sensor.panda_green_waste_upcoming_services', 'entries') or [] %}
            {% set today = now().date() %}
            {% set cutoff = today + timedelta(days=9) %}
            {% set ns = namespace(count=0) %}
            {% for entry in entries %}
              {% set start = entry.start if entry.start is defined else none %}
              {% if start %}
                {% set entry_date = as_datetime(start).date() %}
                {% if today <= entry_date <= cutoff %}
                  {% set ns.count = ns.count + 1 %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.count }}
          attributes:
            summary: >
              {% set entries = state_attr('sensor.panda_green_waste_upcoming_services', 'entries') or [] %}
              {% set today = now().date() %}
              {% set cutoff = today + timedelta(days=9) %}
              {% set ns = namespace(lines=[]) %}
              {% for offset in range(0, 10) %}
                {% set day = today + timedelta(days=offset) %}
                {% set route_visits = namespace(items=[]) %}
                {% set lift_events = namespace(items=[]) %}
                {% for entry in entries %}
                  {% set start = entry.start if entry.start is defined else none %}
                  {% if start and as_datetime(start).date() == day %}
                    {% set subject = (entry.subject if entry.subject is defined else '') %}
                    {% set friendly = subject
                      | replace('RTSC4413266', 'MSW Municipal Mixed')
                      | replace('RTSC4413265', 'Mixed Packaging') %}
                    {% if friendly.startswith('Route Visit:') %}
                      {% set route_visits.items = route_visits.items + [friendly | replace('Route Visit:', '') | trim] %}
                    {% elif friendly.startswith('Lift Event:') %}
                      {% set lift_events.items = lift_events.items + [friendly | replace('Lift Event:', '') | trim] %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {% if route_visits.items or lift_events.items %}
                  {% set lines = [day.strftime('%d/%m/%Y')] %}
                  {% if route_visits.items %}
                    {% set lines = lines + ['Route Visit: ' ~ (route_visits.items | join(', '))] %}
                  {% endif %}
                  {% if lift_events.items %}
                    {% set lines = lines + ['Lift Event: ' ~ (lift_events.items | join(', '))] %}
                  {% endif %}
                  {% set ns.lines = ns.lines + [lines | join('\n')] %}
                {% endif %}
              {% endfor %}
              {{ ns.lines | join('\n\n') if ns.lines else 'No Panda calendar entries in the next 10 days.' }}
            entries: >
              {% set entries = state_attr('sensor.panda_green_waste_upcoming_services', 'entries') or [] %}
              {% set today = now().date() %}
              {% set cutoff = today + timedelta(days=9) %}
              {% set ns = namespace(items=[]) %}
              {% for entry in entries %}
                {% set start = entry.start if entry.start is defined else none %}
                {% if start %}
                  {% set entry_date = as_datetime(start).date() %}
                  {% if today <= entry_date <= cutoff %}
                    {% set subject = (entry.subject if entry.subject is defined else '') %}
                    {% set friendly = subject
                      | replace('RTSC4413266', 'MSW Municipal Mixed')
                      | replace('RTSC4413265', 'Mixed Packaging') %}
                    {% if friendly.startswith('Route Visit:') %}
                      {% set entry_type = 'Route Visit' %}
                    {% elif friendly.startswith('Lift Event:') %}
                      {% set entry_type = 'Lift Event' %}
                    {% else %}
                      {% set entry_type = 'Other' %}
                    {% endif %}
                    {% set item = dict(
                      date=entry_date.strftime('%d/%m/%Y'),
                      type=entry_type,
                      subject=friendly
                    ) %}
                    {% set ns.items = ns.items + [item] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ ns.items }}

  script:
    panda_order_mixed_packaging:
      alias: Panda Order Mixed Packaging
      sequence:
        - service: panda_green_waste.book_pickup
          data:
            pickup_type: Mixed Packaging
            access_start_time: "09:00"
            access_end_time: "23:00"
        - service: input_text.set_value
          target:
            entity_id: input_text.panda_last_ordered_collection
          data:
            value: Mixed Packaging
        - service: input_text.set_value
          target:
            entity_id: input_text.panda_last_ordered_access_window
          data:
            value: 09:00 to 23:00
        - service: input_text.set_value
          target:
            entity_id: input_text.panda_last_ordered_at
          data:
            value: "{{ now().strftime('%Y-%m-%d %H:%M') }}"

    panda_order_msw_municipal_mixed:
      alias: Panda Order MSW Municipal Mixed
      sequence:
        - service: panda_green_waste.book_pickup
          data:
            pickup_type: MSW Municipal Mixed
            access_start_time: "09:00"
            access_end_time: "23:00"
        - service: input_text.set_value
          target:
            entity_id: input_text.panda_last_ordered_collection
          data:
            value: MSW Municipal Mixed
        - service: input_text.set_value
          target:
            entity_id: input_text.panda_last_ordered_access_window
          data:
            value: 09:00 to 23:00
        - service: input_text.set_value
          target:
            entity_id: input_text.panda_last_ordered_at
          data:
            value: "{{ now().strftime('%Y-%m-%d %H:%M') }}"

    panda_order_glass:
      alias: Panda Order Glass
      sequence:
        - service: panda_green_waste.book_pickup
          data:
            pickup_type: Glass
            access_start_time: "09:00"
            access_end_time: "23:00"
        - service: input_text.set_value
          target:
            entity_id: input_text.panda_last_ordered_collection
          data:
            value: Glass
        - service: input_text.set_value
          target:
            entity_id: input_text.panda_last_ordered_access_window
          data:
            value: 09:00 to 23:00
        - service: input_text.set_value
          target:
            entity_id: input_text.panda_last_ordered_at
          data:
            value: "{{ now().strftime('%Y-%m-%d %H:%M') }}"

    panda_order_food_waste_bin:
      alias: Panda Order 140L Food Wasre BIN
      sequence:
        - service: panda_green_waste.book_pickup
          data:
            pickup_type: 140L Food Wasre BIN
            access_start_time: "09:00"
            access_end_time: "23:00"
        - service: input_text.set_value
          target:
            entity_id: input_text.panda_last_ordered_collection
          data:
            value: 140L Food Wasre BIN
        - service: input_text.set_value
          target:
            entity_id: input_text.panda_last_ordered_access_window
          data:
            value: 09:00 to 23:00
        - service: input_text.set_value
          target:
            entity_id: input_text.panda_last_ordered_at
          data:
            value: "{{ now().strftime('%Y-%m-%d %H:%M') }}"

  automation:
    - id: panda_calendar_refresh_every_6_hours
      alias: Panda Calendar Refresh Every 6 Hours
      trigger:
        - platform: time_pattern
          hours: "/6"
      action:
        - service: panda_green_waste.refresh

  input_select:
    panda_collection_type:
      name: Panda Collection Type
      options:
        - Mixed Packaging
        - MSW Municipal Mixed
        - Glass
        - 140L Food Wasre BIN

  input_text:
    panda_last_ordered_collection:
      name: Panda Last Ordered Collection
      max: 100
    panda_last_ordered_access_window:
      name: Panda Last Ordered Access Window
      max: 50
    panda_last_ordered_at:
      name: Panda Last Ordered At
      max: 50
